name: Parity Gate

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "Renderable URL (must expose gorender frontend contract)"
        required: true
        type: string
      preset:
        description: "Preset for baseline and experimental runs"
        required: false
        default: "final"
        type: string
      workers:
        description: "Worker count"
        required: false
        default: "2"
        type: string
      min_ssim:
        description: "Minimum SSIM threshold"
        required: false
        default: "0.995"
        type: string
      min_psnr:
        description: "Minimum PSNR threshold (dB)"
        required: false
        default: "40"
        type: string
      target_speedup:
        description: "Minimum fractional speedup target"
        required: false
        default: "0.30"
        type: string

jobs:
  parity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser || sudo apt-get install -y chromium

      - name: Build gorender
        run: go build -o bin/gorender ./cmd/gorender

      - name: Run parity gate
        run: |
          ./bin/gorender parity \
            --url "${{ inputs.target_url }}" \
            --duration-source auto \
            --preset "${{ inputs.preset }}" \
            --workers "${{ inputs.workers }}" \
            --target-speedup "${{ inputs.target_speedup }}" \
            --min-ssim "${{ inputs.min_ssim }}" \
            --min-psnr "${{ inputs.min_psnr }}" \
            -v

