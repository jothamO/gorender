name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        go: ["1.22.x"]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}

      - name: Go version
        run: go version

      - name: Vet
        run: go vet ./...

      - name: Unit tests
        run: go test ./...

      - name: Build gorender
        run: go build -o bin/gorender ./cmd/gorender

      - name: Build gorendersd
        run: go build -o bin/gorendersd ./cmd/gorendersd

