<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>gorender smooth player</title>
  <style>
    :root {
      --bg: #0b0f14;
      --panel: #131a22;
      --panel2: #0f151c;
      --border: #24303b;
      --text: #dce8f4;
      --muted: #8ea3b7;
      --ok: #39d98a;
      --warn: #ffd166;
      --err: #ff6b6b;
      --accent: #5cc8ff;
      --radius: 10px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: radial-gradient(1100px 700px at 80% -5%, #1d2b39 0%, var(--bg) 60%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }
    header {
      border-bottom: 1px solid var(--border);
      padding: 14px 18px;
      background: rgba(12, 17, 22, 0.8);
      display: flex;
      gap: 12px;
      align-items: center;
    }
    header strong { color: var(--ok); font-family: Consolas, "Courier New", monospace; }
    header span { color: var(--muted); font-size: 13px; }
    main {
      display: grid;
      grid-template-columns: minmax(340px, 440px) 1fr;
      min-height: 0;
    }
    .left {
      border-right: 1px solid var(--border);
      background: linear-gradient(180deg, var(--panel) 0%, var(--panel2) 100%);
      padding: 16px;
      overflow: auto;
    }
    .right { padding: 16px; overflow: auto; }
    .card {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: rgba(8, 12, 16, 0.5);
      padding: 14px;
      margin-bottom: 12px;
    }
    .card h2 {
      margin: 0 0 10px;
      font-size: 11px;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      color: var(--muted);
      font-family: Consolas, "Courier New", monospace;
    }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .field { margin-bottom: 8px; }
    label {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 12px;
      font-family: Consolas, "Courier New", monospace;
    }
    input, select, button {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #101822;
      color: var(--text);
      padding: 10px;
      font-size: 13px;
    }
    button { cursor: pointer; font-weight: 600; }
    #submitBtn { background: var(--ok); border-color: var(--ok); color: #062111; }
    .meta { font-size: 12px; color: var(--muted); margin-top: 8px; min-height: 16px; }
    .meta.ok { color: var(--ok); }
    .meta.err { color: var(--err); }
    .jobs-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .jobs-grid { display: grid; gap: 10px; }
    .job {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      background: #10161d;
    }
    .job-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 6px;
      align-items: baseline;
    }
    .id { font-family: Consolas, "Courier New", monospace; font-size: 11px; color: var(--muted); }
    .status { text-transform: uppercase; font-size: 10px; letter-spacing: 1px; font-family: Consolas, "Courier New", monospace; }
    .status.done { color: var(--ok); }
    .status.failed { color: var(--err); }
    .status.rendering { color: var(--accent); }
    .status.queued { color: var(--warn); }
    .progress {
      height: 6px;
      background: #1c2732;
      border-radius: 4px;
      overflow: hidden;
      margin: 7px 0;
    }
    .progress > div {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #35cb81 0%, #5cc8ff 100%);
    }
    .job-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }
    .job-actions a, .job-actions button {
      text-align: center;
      text-decoration: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px;
      background: #0f1620;
      color: var(--text);
      font-size: 12px;
    }
    #player {
      width: min(100%, 720px);
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #000;
      display: none;
      margin-top: 10px;
    }
    @media (max-width: 1020px) {
      main { grid-template-columns: 1fr; }
      .left { border-right: none; border-bottom: 1px solid var(--border); }
    }
  </style>
</head>
<body>
  <header>
    <strong>gorender</strong>
    <span>smooth player (optional ui)</span>
  </header>
  <main>
    <section class="left">
      <div class="card">
        <h2>Create Job</h2>
        <div class="field">
          <label for="apiKey">API Key (optional)</label>
          <input id="apiKey" type="password" placeholder="Bearer token for /jobs" />
        </div>
        <div class="field">
          <label for="url">Composition URL</label>
          <input id="url" type="text" placeholder="http://127.0.0.1:8080/moments-mm57lkdh" />
        </div>
        <div class="row">
          <div class="field">
            <label for="frames">Duration Frames</label>
            <input id="frames" type="number" min="1" value="300" />
          </div>
          <div class="field">
            <label for="fps">FPS</label>
            <input id="fps" type="number" min="1" value="30" />
          </div>
        </div>
        <div class="row">
          <div class="field">
            <label for="width">Width</label>
            <input id="width" type="number" min="1" value="720" />
          </div>
          <div class="field">
            <label for="height">Height</label>
            <input id="height" type="number" min="1" value="1280" />
          </div>
        </div>
        <div class="row">
          <div class="field">
            <label for="crf">CRF</label>
            <input id="crf" type="number" min="1" max="51" value="20" />
          </div>
          <div class="field">
            <label for="preset">Preset</label>
            <select id="preset">
              <option value="medium">medium</option>
              <option value="fast">fast</option>
              <option value="slow">slow</option>
            </select>
          </div>
        </div>
        <button id="submitBtn" type="button">Render</button>
        <div id="submitMsg" class="meta"></div>
      </div>
      <div class="card">
        <h2>Playback</h2>
        <div class="meta">Click "Play" on a completed job to preview output.</div>
        <video id="player" controls></video>
      </div>
    </section>
    <section class="right">
      <div class="jobs-header">
        <h2 style="margin:0;color:var(--muted);font-size:12px;font-family:Consolas,'Courier New',monospace;letter-spacing:1.2px;text-transform:uppercase;">Jobs</h2>
        <button id="refreshBtn" type="button" style="width:auto;padding:8px 12px;">Refresh</button>
      </div>
      <div id="jobs" class="jobs-grid"></div>
    </section>
  </main>

  <script>
    const apiKeyInput = document.getElementById('apiKey');
    const urlInput = document.getElementById('url');
    const framesInput = document.getElementById('frames');
    const fpsInput = document.getElementById('fps');
    const widthInput = document.getElementById('width');
    const heightInput = document.getElementById('height');
    const crfInput = document.getElementById('crf');
    const presetInput = document.getElementById('preset');
    const submitBtn = document.getElementById('submitBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const jobsEl = document.getElementById('jobs');
    const submitMsg = document.getElementById('submitMsg');
    const player = document.getElementById('player');

    const savedKey = localStorage.getItem('gorender_ui_api_key') || '';
    apiKeyInput.value = savedKey;

    function authHeaders() {
      const key = apiKeyInput.value.trim();
      if (key) {
        localStorage.setItem('gorender_ui_api_key', key);
        return { Authorization: 'Bearer ' + key };
      }
      localStorage.removeItem('gorender_ui_api_key');
      return {};
    }

    function fmtPct(n) {
      return (Math.max(0, Math.min(1, Number(n) || 0)) * 100).toFixed(1) + '%';
    }

    function setSubmitMsg(text, mode) {
      submitMsg.textContent = text;
      submitMsg.className = 'meta' + (mode ? ' ' + mode : '');
    }

    async function apiFetch(path, options = {}) {
      const headers = Object.assign({}, options.headers || {}, authHeaders());
      const r = await fetch(path, Object.assign({}, options, { headers }));
      if (!r.ok) {
        const payload = await r.json().catch(() => ({}));
        throw new Error(payload.error || ('request failed: ' + r.status));
      }
      return r;
    }

    async function createJob() {
      setSubmitMsg('', '');
      const body = {
        url: urlInput.value.trim(),
        durationFrames: Number(framesInput.value),
        fps: Number(fpsInput.value),
        width: Number(widthInput.value),
        height: Number(heightInput.value),
        output: {
          path: './output/ui-' + Date.now() + '.mp4',
          crf: Number(crfInput.value),
          preset: presetInput.value
        }
      };
      submitBtn.disabled = true;
      try {
        await apiFetch('/jobs', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        setSubmitMsg('job queued', 'ok');
        await refreshJobs();
      } catch (e) {
        setSubmitMsg(String(e.message || e), 'err');
      } finally {
        submitBtn.disabled = false;
      }
    }

    async function deleteJob(id) {
      try {
        await apiFetch('/jobs/' + encodeURIComponent(id), { method: 'DELETE' });
        await refreshJobs();
      } catch (e) {
        alert(String(e.message || e));
      }
    }

    function playJob(downloadPath) {
      player.src = downloadPath;
      player.style.display = 'block';
      player.play().catch(() => {});
    }

    function renderJobs(jobs) {
      if (!Array.isArray(jobs) || jobs.length === 0) {
        jobsEl.innerHTML = '<div class="card"><div class="meta">No jobs yet. Create one from the left panel.</div></div>';
        return;
      }
      jobsEl.innerHTML = jobs.map((job) => {
        const status = String(job.status || '').toLowerCase();
        const downloadPath = '/jobs/' + encodeURIComponent(job.id) + '/download';
        const duration = job.duration ? ('<div class="id">duration: ' + job.duration + '</div>') : '';
        const err = job.error ? ('<div class="id" style="color:var(--err)">error: ' + job.error + '</div>') : '';
        const playBtn = status === 'done'
          ? '<button type="button" data-play="' + downloadPath + '">Play</button>'
          : '<button type="button" disabled>Play</button>';
        const dlBtn = status === 'done'
          ? '<a href="' + downloadPath + '">Download</a>'
          : '<a style="opacity:.5;pointer-events:none;" href="#">Download</a>';
        return (
          '<article class="job">' +
            '<div class="job-top">' +
              '<div class="id">' + job.id + '</div>' +
              '<div class="status ' + status + '">' + status + '</div>' +
            '</div>' +
            '<div class="progress"><div style="width:' + fmtPct(job.progress) + '"></div></div>' +
            '<div class="id">progress: ' + fmtPct(job.progress) + (job.eta ? (' | eta: ' + job.eta) : '') + '</div>' +
            duration + err +
            '<div class="job-actions">' + playBtn + dlBtn + '</div>' +
            '<div class="job-actions" style="margin-top:8px;"><button type="button" data-del="' + job.id + '">Delete</button><span></span></div>' +
          '</article>'
        );
      }).join('');
    }

    async function refreshJobs() {
      try {
        const r = await apiFetch('/jobs');
        const payload = await r.json();
        const jobs = (payload.jobs || []).slice().sort((a, b) => String(b.createdAt || '').localeCompare(String(a.createdAt || '')));
        renderJobs(jobs);
      } catch (e) {
        jobsEl.innerHTML = '<div class="card"><div class="meta err">' + String(e.message || e) + '</div></div>';
      }
    }

    jobsEl.addEventListener('click', (ev) => {
      const t = ev.target;
      if (!(t instanceof HTMLElement)) return;
      const play = t.getAttribute('data-play');
      if (play) {
        playJob(play);
        return;
      }
      const del = t.getAttribute('data-del');
      if (del) {
        deleteJob(del);
      }
    });

    submitBtn.addEventListener('click', createJob);
    refreshBtn.addEventListener('click', refreshJobs);
    refreshJobs();
    setInterval(refreshJobs, 3000);
  </script>
</body>
</html>
